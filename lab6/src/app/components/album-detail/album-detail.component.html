<div class="detail-page">

  <button class="btn-back" (click)="goBack()">← Return to Registry</button>

  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Accessing classified file...</p>
  </div>

  <div *ngIf="error && !loading" class="error-msg">
    ⚠ {{ error }}
    <button class="btn-retry" (click)="ngOnInit()">RETRY</button>
  </div>

  <div *ngIf="!loading && !error && album" class="detail-card">

    <div class="card-header">
      <div class="section-tag">MISSION FILE</div>
      <div class="detail-meta">
        <span class="badge">FILE #{{ album.id }}</span>
        <span class="badge">UNIT {{ album.userId }}</span>
      </div>
    </div>

    <div class="edit-group">
      <label for="albumTitle">Series Designation</label>
      <input
        id="albumTitle"
        [(ngModel)]="album.title"
        class="title-input"
        placeholder="Enter series designation" />
    </div>

    <div class="detail-actions">
      <button class="btn-save" (click)="save()" [disabled]="saving">
        {{ saving ? 'UPDATING...' : saved ? '✔ COMMITTED' : 'COMMIT CHANGES' }}
      </button>
      <button class="btn-photos" (click)="viewPhotos()">
        VIEW DOSSIER
      </button>
    </div>

  </div>
</div>
