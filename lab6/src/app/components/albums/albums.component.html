<div class="albums-page">

  <div class="albums-header">
    <div class="albums-header-left">
      <div class="section-tag">INTELLIGENCE REGISTRY</div>
      <h1>Mission Archives</h1>
    </div>
    <span *ngIf="!loading" class="albums-count">
      {{ allAlbums.length }} entries · Page {{ currentPage }} / {{ totalPages }}
    </span>
  </div>

  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Retrieving classified data...</p>
  </div>

  <div *ngIf="error" class="error-msg">⚠ {{ error }}</div>

  <div *ngIf="!loading && !error" class="albums-list">
    <div
      *ngFor="let album of visibleAlbums"
      class="album-row"
      (click)="goToDetail(album.id)">
      <span class="album-id">{{ album.id | number:'3.0' }}</span>
      <div class="album-info">
        <span class="album-title">{{ album.title }}</span>
        <span class="album-status">CLASSIFIED · SERIES FILE</span>
      </div>
      <button class="btn-delete" (click)="deleteAlbum($event, album.id)">
        PURGE
      </button>
    </div>
  </div>

  <div *ngIf="!loading && !error && totalPages > 1" class="pagination">
    <button class="page-btn" (click)="goToPage(1)" [disabled]="currentPage === 1">«</button>
    <button class="page-btn" (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1">‹</button>
    <button
      *ngFor="let p of pages"
      class="page-btn"
      [class.active]="p === currentPage"
      (click)="goToPage(p)">{{ p }}</button>
    <button class="page-btn" (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages">›</button>
    <button class="page-btn" (click)="goToPage(totalPages)" [disabled]="currentPage === totalPages">»</button>
  </div>

</div>
