<div class="auth-shell">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div class="brand-name">SmartMed</div>
    </div>

    <h2 class="title">{{ 'login.title' | translate }}</h2>
    <p class="subtitle">{{ 'login.tagline' | translate }}</p>

    @if (errorMessage) {
      <div class="alert alert-error">{{ errorMessage }}</div>
    }

    <div class="form-group">
      <label for="username">{{ 'login.username' | translate }}</label>
      <input
        type="text"
        id="username"
        name="username"
        [(ngModel)]="username"
        [placeholder]="'login.usernamePlaceholder' | translate"
      />
    </div>

    <div class="form-group">
      <label for="password">{{ 'login.password' | translate }}</label>
      <input
        type="password"
        id="password"
        name="password"
        [(ngModel)]="password"
        placeholder="••••••••"
      />
    </div>

    <div class="row-between">
      <div class="checkbox-wrap">
        <input
          type="checkbox"
          id="remember"
          name="remember"
          [(ngModel)]="rememberMe"
        />
        <label for="remember">{{ 'login.remember' | translate }}</label>
      </div>

      <a class="link muted" routerLink="/register">{{ 'nav.register' | translate }}</a>
    </div>

    <button class="btn primary" (click)="onLogin()" [disabled]="isLoading">
      @if (isLoading) {
        {{ 'common.loading' | translate }}
      } @else {
        {{ 'login.submit' | translate }}
      }
    </button>

    <div class="fineprint">
      <span>Forgot Password?</span>
      <span class="dot">•</span>
      <a class="link" routerLink="/register">Sign Up</a>
    </div>
  </div>
</div>
